name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Sync actual tournament results
        run: python scripts/sync_actual_results.py

      - name: Determine generated metadata timestamp
        id: generated_at
        shell: bash
        run: |
          value="$(python - <<'PY'
          import json
          from pathlib import Path

          doc = json.loads(Path("data/actual-results.json").read_text(encoding="utf-8"))
          print(doc.get("metadata", {}).get("asOf") or "")
          PY
          )"

          if [ -z "$value" ]; then
            value="$(git log -1 --format=%cI)"
          fi

          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Generate tracker data
        run: >
          python scripts/generate_tracker_data.py
          --generated-at "${{ steps.generated_at.outputs.value }}"

      - name: Publish frontend data
        run: python scripts/publish_frontend_data.py

      - name: Run backend tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run frontend tests
        working-directory: app
        run: npm test -- --run

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
